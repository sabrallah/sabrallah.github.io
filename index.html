<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Documents RH - AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #8892b0;
            font-size: 1rem;
        }

        .card {
            background: #1e2a4a;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ccd6f6;
            margin-bottom: 8px;
            font-weight: 500;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #2d3a5f;
            border-radius: 8px;
            background: #0d1525;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #64ffda;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            background: linear-gradient(135deg, #64ffda 0%, #00b4d8 100%);
            color: #0d1525;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(100, 255, 218, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 30px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result h3 {
            color: #64ffda;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid #64ffda;
            color: #64ffda;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #64ffda;
            color: #0d1525;
        }

        .export-btn {
            background: #4a90d9;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .export-btn:hover {
            background: #357abd;
        }

        .document-output {
            background: #0d1525;
            border: 1px solid #2d3a5f;
            border-radius: 8px;
            padding: 20px;
            color: #ccd6f6;
            white-space: pre-wrap;
            line-height: 1.7;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            color: #64ffda;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3a5f;
            border-top-color: #64ffda;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .api-key-section {
            background: #0d1525;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .api-key-section input {
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 Générateur de Documents RH</h1>
        </header>



            <div class="form-group">
                <label for="docType">Type de document</label>
                <select id="docType">
                    <option value="appel_candidature">Appel à candidature</option>
                    <option value="offre_emploi">Offre d'emploi</option>
                    <option value="contrat_travail">Contrat de travail</option>
                    <option value="convocation_entretien">Convocation à un entretien</option>
                    <option value="attestation_travail">Attestation de travail</option>
                    <option value="lettre_recommandation">Lettre de recommandation</option>
                    <option value="note_service">Note de service</option>
                    <option value="procedure_recrutement">Procedure de recrutement</option>
                    <option value="evaluation_annuelle">Evaluation annuelle</option>
                    <option value="licenciement">Lettre de licenciement</option>
                    <option value="demission">Lettre de demission</option>
                    <option value="decision_conge">Décision de congé</option>
                    <option value="autre">Autre document...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="companyName">Nom de l'entreprise</label>
                <input type="text" id="companyName" value="CASA BAÏA" style="display:none" />
            </div>

            <div class="form-group">
                <label for="position">Poste / Fonction</label>
                <input type="text" id="position" placeholder="Ex: Développeur Web, Chef de projet..." />
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" />
            </div>

            <div class="form-group">
                <label for="details">Détails supplémentaires</label>
                <textarea id="details" placeholder="Décrivez les compétences requises, les conditions de travail, le salaire, les avantages, etc."></textarea>
            </div>

            <button class="btn" onclick="generateDocument()">Générer le document</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Génération du document en cours...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <div class="result-header">
                    <h3>Document généré</h3>
                    <div style="display: flex; gap: 10px;">
                        <button class="copy-btn" onclick="copyDocument()">Copier</button>
                        <button class="export-btn" onclick="exportToDocx()">Exporter DOCX</button>
                    </div>
                </div>
                <div class="document-output" id="documentOutput"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/docx@8.2.2/build/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script>
        const documentTemplates = {
            appel_candidature: "Rédigez un appel à candidature professionnel pour le poste de {position} chez CASA BAÏA.\n\nCASA BAÏA est une Société de Développement Local (SDL) créée en 2008 à Casablanca, avec un capital de 40 MDH (51% Commune de Casablanca, 49% CDG Développement). Ses activités principales sont:\n- Propreté: Accompagnement et contrôle de l'activité des délégataires de la propreté urbaine\n- Gestion des déchets: Gestion de la décharge contrôlée de Casablanca\n- Espaces verts: Entretien des places et espaces verts\n- Salubrité & Hygiène: Désinfection, dératisation, désinsectisation, lutte contre les nuisibles\n- Stationnement: Gestion du stationnement sur voirie et dans les parkings\n\nLe document doit contenir uniquement ces 5 sections:\n\n1. MISSIONS DU POSTE: Décrivez les missions et responsabilités que le candidat exercera, en les adaptant à la nature d'activité de CASA BAÏA (propreté, gestion des déchets, espaces verts, salubrité, stationnement) et aux informations suivantes: {details}\n\n2. QUALITÉS PERSONNELLES: Listez les qualities personnelles et compétences comportementales requises pour ce poste en tenant compte du secteur d'activité (services municipaux, environnement, travail de terrain), basées sur: {details}\n\n3. COMPÉTENCES TECHNIQUES: Spécifiez les compétences techniques et savoir-faire liés au poste et aux activités de CASA BAÏA (gestion des déchets, propreté urbaine, espaces verts, salubrité, stationnement), selon: {details}\n\n4. FORMATION ET DIPLÔMES: Spécifiez la formation ou les diplômes nécessaires en utilisant le système éducatif marocain (Bac, Bac+2, Bac+3, Bac+5, Master, Doctorat, formations professionnelles, DUT, BTS, etc.), adaptés au poste: {details}\n\n5. EXPÉRIENCE: Indiquez l'expérience professionnelle requise pour ce poste en tenant compte du secteur d'activité de CASA BAÏA: {details}\n\nIMPORTANT: Le document doit être en français, professionnel, formel, et ne contenir que ces 5 sections sans autres informations.",
            offre_emploi: "Rédigez une offre d'emploi complète et attractive pour le poste de {position} chez {company}. Inclure: missions, responsabilités, profil requis, conditions salariales, avantages et procédure de candidature.",
            contrat_travail: "Rédigez un contrat de travail pour le poste de {position} chez {company}. Inclure: type de contrat, durée, salaire, avantages, obligations et conditions de rupture.",
            convocation_entretien: "Rédigez une convocation à un entretien d'embauche pour le poste de {position} chez {company}.",
            attestation_travail: "Rédigez une attestation de travail pour un empleado ayant occuppé le poste de {position} chez {company}.",
            lettre_recommandation: "Rédigez une lettre de recommandation professionnelle pour un ancien employé ayant travaillé comme {position} chez {company}.",
            note_service: "Rédigez une note de service interne pour les employés de {company} concernant {position}.",
            procedure_recrutement: "Rédigez une procédure de recrutement complète pour {company} pour le poste de {position}.",
            evaluation_annuelle: "Rédigez un formulaire d'évaluation annuelle pour le poste de {position} chez {company}.",
            licenciement: "Rédigez une lettre de licenciement pour un employé au poste de {position} chez {company}.",
            demission: "Rédigez une lettre de démission pour un employé au poste de {position} chez {company}.",
            decision_conge: "Rédigez une décision de congé professionnelle avec la structure suivante:\n\n[TITRE]: DECISION DE CONGE\nDATE: {date}\n\n[DEUXIÈME TITRE]: DIRECTION GÉNÉRALE DE CASABLANCA BAÏA\n\n[TROISIÈME TITRE]: Décide\n\nLe document doit être en français, formel, avec en-tête officiel de l'entreprise {company}.",
            autre: "Rédigez un document RH professionnel pour {position} chez {company}. Contexte: {details}"
        };

        const GROQ_API_KEY = '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';

        async function generateDocument() {
            const apiKey = GROQ_API_KEY;
            const docType = document.getElementById('docType').value;
            const company = document.getElementById('companyName').value.trim();
            const position = document.getElementById('position').value.trim();
            const dateInput = document.getElementById('date').value;
            const date = dateInput ? new Date(dateInput).toLocaleDateString('fr-FR') : '';
            const details = document.getElementById('details').value.trim();

            const errorEl = document.getElementById('error');
            const resultEl = document.getElementById('result');
            const loadingEl = document.getElementById('loading');
            const outputEl = document.getElementById('documentOutput');

            errorEl.classList.remove('show');
            resultEl.classList.remove('show');

            if (!apiKey) {
                errorEl.textContent = 'Veuillez entrer votre clé API Groq';
                errorEl.classList.add('show');
                return;
            }

            if (!position) {
                errorEl.textContent = 'Veuillez entrer le poste';
                errorEl.classList.add('show');
                return;
            }

            let prompt = documentTemplates[docType]
                .replace('{company}', 'CASA BAÏA')
                .replace('{position}', position)
                .replace('{date}', date)
                .replace('{details}', details || 'aucune information supplémentaire');

            loadingEl.classList.add('show');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            {
                                role: 'system',
                                content: 'Vous êtes un expert en ressources humaines et communication professionnelle. Rédigez des documents RH clairs, professionnels et en français. Utilisez un ton formel et approprié au contexte.'
                            },
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Erreur lors de la génération');
                }

                const data = await response.json();
                const generatedText = data.choices[0].message.content;

                outputEl.textContent = generatedText;
                resultEl.classList.add('show');

            } catch (error) {
                errorEl.textContent = error.message || 'Une erreur est survenue';
                errorEl.classList.add('show');
            } finally {
                loadingEl.classList.remove('show');
            }
        }

        function copyDocument() {
            const text = document.getElementById('documentOutput').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copié!';
                setTimeout(() => btn.textContent = 'Copier', 2000);
            });
        }

        function exportToDocx() {
            const text = document.getElementById('documentOutput').textContent;
            const docType = document.getElementById('docType').value;
            const position = document.getElementById('position').value.trim() || 'document';
            
            const children = [
                new docx.Paragraph({
                    children: [new docx.TextRun({ text: "Royaume du Maroc", bold: false, size: 20, font: "Times New Roman" })],
                    alignment: docx.AlignmentType.CENTER,
                }),
                new docx.Paragraph({
                    children: [new docx.TextRun({ text: "Wilaya de la Région Casablanca-Settat", bold: false, size: 20, font: "Times New Roman" })],
                    alignment: docx.AlignmentType.CENTER,
                }),
                new docx.Paragraph({
                    children: [new docx.TextRun({ text: "Commune de Casablanca", bold: false, size: 20, font: "Times New Roman" })],
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 100 },
                }),
                new docx.Paragraph({
                    children: [new docx.TextRun({ text: "________________________________", size: 20, font: "Times New Roman" })],
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 400 },
                }),
                new docx.Paragraph({
                    children: [new docx.TextRun({ text: "CASA BAÏA", bold: true, size: 36, font: "Times New Roman", color: "000080" })],
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 100 },
                }),
                new docx.Paragraph({
                    children: [new docx.TextRun({ text: "Société de Développement Local", italic: true, size: 24, font: "Times New Roman" })],
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 600 },
                }),
            ];

            const fullText = text;
            
            if (docType === 'appel_candidature') {
                const sectionNames = ['MISSIONS DU POSTE', 'QUALITÉS PERSONNELLES', 'COMPÉTENCES TECHNIQUES', 'FORMATION ET DIPLÔMES', 'EXPÉRIENCE'];
                let sectionsData = [];
                
                for (let i = 0; i < sectionNames.length; i++) {
                    const currentSection = sectionNames[i];
                    const nextSection = sectionNames[i + 1];
                    
                    let startIdx = fullText.indexOf(currentSection);
                    if (startIdx === -1) {
                        startIdx = fullText.toUpperCase().indexOf(currentSection);
                    }
                    
                    if (startIdx !== -1) {
                        let endIdx = nextSection ? fullText.toUpperCase().indexOf(nextSection) : fullText.length;
                        if (endIdx === -1) endIdx = fullText.length;
                        
                        const sectionContent = fullText.substring(startIdx, endIdx).trim();
                        const contentLines = sectionContent.split('\n').slice(1).map(l => l.trim()).filter(l => l);
                        sectionsData.push({ title: currentSection, content: contentLines });
                    }
                }

                for (const section of sectionsData) {
                    children.push(
                        new docx.Paragraph({
                            children: [new docx.TextRun({ text: section.title, bold: true, size: 26, font: "Times New Roman", color: "000080" })],
                            spacing: { before: 400, after: 200 },
                        })
                    );
                    
                    children.push(
                        new docx.Paragraph({
                            border: { bottom: { color: "000080", space: 2, value: "single", size: 12 } },
                            spacing: { after: 300 },
                        })
                    );

                    for (const line of section.content) {
                        const cleanLine = line.replace(/^[•\-\*]\s*/, '').trim();
                        if (cleanLine) {
                            children.push(
                                new docx.Paragraph({
                                    children: [
                                        new docx.TextRun({ text: "•", size: 22, font: "Times New Roman", color: "000080" }),
                                        new docx.TextRun({ text: "  " + cleanLine, size: 22, font: "Times New Roman" }),
                                    ],
                                    spacing: { after: 120 },
                                    indent: { left: 720 },
                                })
                            );
                        }
                    }
                }
            } else {
                const lines = fullText.split('\n').filter(l => l.trim());
                for (const line of lines) {
                    children.push(
                        new docx.Paragraph({
                            children: [new docx.TextRun({ text: line.trim(), size: 22, font: "Times New Roman" })],
                            spacing: { after: 120 },
                        })
                    );
                }
            }

            children.push(
                new docx.Paragraph({
                    children: [new docx.TextRun({ text: "Fait à Casablanca, le " + new Date().toLocaleDateString('fr-MA'), size: 20, font: "Times New Roman", italic: true })],
                    spacing: { before: 800 },
                    alignment: docx.AlignmentType.RIGHT,
                })
            );

            const doc = new docx.Document({
                sections: [{
                    properties: { 
                        page: { margin: { top: 1440, bottom: 1440, left: 1440, right: 1440 } }
                    },
                    children: children,
                }],
            });

            const fileName = docType === 'decision_conge' ? 'Decision_Conge' : 
                           docType === 'appel_candidature' ? `Appel_Candidature_${position.replace(/\s+/g, '_')}` :
                           `${docType}_${position.replace(/\s+/g, '_')}`;
            
            docx.Packer.toBlob(doc).then(blob => {
                saveAs(blob, `${fileName}.docx`);
            });
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                generateDocument();
            }
        });
    </script>
</body>
</html>
